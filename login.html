<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página Login</title>

    <link rel="stylesheet" href="Css/login.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="login-container">
      <section class="lado-esquerdo">
        <div class="logo">
          <img src="assets/imgs/Logo_HARPIA.png" alt="Logo da HARPIA" />

          <div class="titulo-container">
            <h1>H.A.R.P.I.A</h1>
            <span>aprenda do seu jeito</span>
          </div>
        </div>

        <div class="banner-pluma">
          <h2>Aprender do seu Jeito.</h2>
          <p>
            Uma plataforma que se adapta a você e transforma seus estudos em
            conquistas.
          </p>
          <img src="assets/imgs/Pluma.png" alt="Mascote Pluma" />
        </div>
      </section>

      <section class="lado-direito">
        <div class="login-conta">
          <div class="form-header">
            <h2>Bem vindo(a) de volta!</h2>
            <p>
              Entre com sua conta para continuar sua jornada de aprendizagem.
            </p>
          </div>

          <form action="pg-usuario.html" method="get">
            <div class="form-group">
              <label for="usuario">Email ou Nome de Usuário:</label>
              <input
                type="text"
                id="usuario"
                placeholder="Digite seu email ou user"
                required
              />
            </div>

            <div class="form-group">
              <label for="senha">Senha:</label>
              <input
                type="password"
                id="senha"
                placeholder="Digite sua senha"
                required
              />
              <a href="#" class="link-esqueceu-senha">Esqueceu sua senha?</a>
            </div>

            <button type="submit" class="btn-entrar">Entrar</button>

            <div class="divisor">
              <span>ou</span>
            </div>

            <button type="button" class="btn-google">
              <img
                src="assets/icon-google.svg"
                alt="logo do Google"
                class="icon-google"
              />
              Entrar com o Google
            </button>

            <p class="form-footer">
              Não tem uma conta? <a href="index.html">Crie sua conta</a>
            </p>
          </form>
        </div>
      </section>
    </main>

    <!-- Plugin VLibras -->

    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script src="JavaScript/login.js"></script>

    <!-- plugin acessibiidade -->
    <script
      src="https://cdn.jsdelivr.net/npm/sienna-accessibility/dist/sienna-accessibility.umd.js"
      async
    ></script>
  </body>
</html>
