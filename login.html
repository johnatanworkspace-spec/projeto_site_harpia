<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página Login</title>
    <link rel="stylesheet" href="Css/login.css">
  </head>
  <body>
    <main class="login-container">
      <section class="lado-esquerdo">
        <div class="logo">
          <img src="assets/imgs/Logo_HARPIA.png" alt="Logo da HARPIA" />

          <div class="titulo-container">
            <h1>H.A.R.P.I.A</h1>
            <span>aprenda do seu jeito</span>
          </div>
        </div>

        <div class="banner-pluma">
          <h2>
            Aprender do <br />
            Seu Jeito.
          </h2>
          <p>
            Uma plataforma que se adapta a você <br />
            e transforma seus estudos em conquista
          </p>
          <img src="assets/imgs/Pluma.png" alt="Mascote Pluma" />
        </div>
      </section>

      <section class="lado-direito">

<div class="LoginConta">
        
<div class="form-header">
<h2>Bem Vindo de Volta (a)!</h2>
<p>Entre com sua conta para continuar sua jornada 
de aprendizagem.</p>
</div>

<form action="">

<div class="form-group">
<label for="usuário">Email ou Nome de Usuário:</label>
<div class="input-container">
<input type="text" id="usuário" placeholder="digite seu email ou user">

</div>
</div>

<div class="form-row">
<div class="form-group">
<label for="senha">Senha:</label>
<input type="password" id="senha" placeholder="Digite sua senha">
  <a href="#" class="link-esqueceu-senha">Esqueceu sua senha?</a>
</div>
</div>

<button type="submit" class="btn-criar">Entrar</button>
            
<div class="divisor">
<span>ou</span>
</div>
            
<button type="button" class="btn-google"> Entrar conta com o Google</button>

<p class="form-footer">Não tem uma conta? <a href="index.html">Crie sua conta</a></p>
</form>

</div>

</section>

    </main>
  </body>
</html>
